<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & shadow" subtitle="Generous rounding, soft cocoa-tinted shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 24px;background:var(--cream-50);font-family:var(--font-display);display:flex;gap:26px;align-items:flex-start;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:78px;height:62px;background:var(--white);border:1px solid var(--cream-200)}
  .lab{font-size:11px;color:var(--text-muted)}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">radius-sm · 10</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">radius-md · 16</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">radius-lg · 22</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:62px"></div><span class="lab">radius-pill</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:none"></div><span class="lab">shadow-sm</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md);border:none"></div><span class="lab">shadow-md</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-lg);border:none"></div><span class="lab">shadow-lg</span></div>
</body></html>
