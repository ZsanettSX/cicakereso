<!-- @dsCard group="Colors" viewport="700x150" name="Status colours" subtitle="Earthy, muted — never clinical neon" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px 20px;background:var(--white);font-family:var(--font-display);display:flex;gap:12px}
  .chip{flex:1;border-radius:var(--radius-md);padding:12px;box-sizing:border-box;height:92px;display:flex;flex-direction:column;justify-content:space-between}
  .dot{width:18px;height:18px;border-radius:50%}
  .lab{font-size:12px;font-weight:600;color:var(--text-strong)}
  .tok{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="chip" style="background:var(--success-bg)"><span class="dot" style="background:var(--success)"></span><span class="lab">Elérhető</span><span class="tok">--success</span></div>
  <div class="chip" style="background:var(--warning-bg)"><span class="dot" style="background:var(--warning)"></span><span class="lab">Foglalt</span><span class="tok">--warning</span></div>
  <div class="chip" style="background:var(--danger-bg)"><span class="dot" style="background:var(--danger)"></span><span class="lab">Sürgős</span><span class="tok">--danger</span></div>
  <div class="chip" style="background:var(--info-bg)"><span class="dot" style="background:var(--info)"></span><span class="lab">Info</span><span class="tok">--info</span></div>
</body></html>
