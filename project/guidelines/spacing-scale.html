<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid — space-1 through space-9" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px 24px;background:var(--cream-50);font-family:var(--font-display)}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
  .bar{height:16px;background:var(--sage-300);border-radius:4px}
  .lab{font-size:11px;color:var(--text-muted);width:120px}
</style></head><body>
  <div class="r"><div class="lab">--space-1 · 4</div><div class="bar" style="width:4px"></div></div>
  <div class="r"><div class="lab">--space-2 · 8</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="lab">--space-4 · 16</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="lab">--space-5 · 24</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="lab">--space-6 · 32</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="lab">--space-8 · 48</div><div class="bar" style="width:48px"></div></div>
  <div class="r"><div class="lab">--space-9 · 64</div><div class="bar" style="width:64px"></div></div>
</body></html>
