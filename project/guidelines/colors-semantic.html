<!-- @dsCard group="Colors" viewport="700x150" name="Semantic roles" subtitle="Primary, accent, surfaces & text on cream" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px 20px;background:var(--cream-50);font-family:var(--font-display);display:flex;gap:12px}
  .chip{flex:1;border-radius:var(--radius-md);padding:12px;box-sizing:border-box;height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm)}
  .lab{font-size:12px;font-weight:600}
  .tok{font-size:10px;opacity:.8}
</style></head><body>
  <div class="chip" style="background:var(--color-primary);color:var(--color-primary-text)"><span class="lab">Primary</span><span class="tok">--color-primary · forest-700</span></div>
  <div class="chip" style="background:var(--color-accent);color:var(--color-accent-text)"><span class="lab">Accent</span><span class="tok">--color-accent · camel-500</span></div>
  <div class="chip" style="background:var(--surface-sage);color:var(--forest-800)"><span class="lab">Surface · sage</span><span class="tok">--surface-sage</span></div>
  <div class="chip" style="background:var(--surface-card);color:var(--text-strong);border:1px solid var(--cream-200)"><span class="lab">Card</span><span class="tok">--surface-card</span></div>
  <div class="chip" style="background:var(--cocoa-700);color:var(--cream-50)"><span class="lab">Text strong</span><span class="tok">--text-strong · cocoa</span></div>
</body></html>
