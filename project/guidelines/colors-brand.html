<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="The seven core brand-board colours" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px 20px;background:var(--white);font-family:var(--font-display)}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
  .hex{font-size:11px;font-weight:600;background:rgba(255,255,255,.82);padding:2px 6px;border-radius:6px;color:#3a2a1e}
  .names{display:flex;gap:0;margin-top:8px}
  .nm{flex:1;font-size:11px;color:var(--text-muted);text-align:center}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#faf1e4"><span class="hex">#faf1e4</span></div>
  <div class="sw" style="background:#f2ebdf"><span class="hex">#f2ebdf</span></div>
  <div class="sw" style="background:#d6dfce"><span class="hex">#d6dfce</span></div>
  <div class="sw" style="background:#b7c9a8"><span class="hex">#b7c9a8</span></div>
  <div class="sw" style="background:#47553c"><span class="hex">#47553c</span></div>
  <div class="sw" style="background:#d4a373"><span class="hex">#d4a373</span></div>
  <div class="sw" style="background:#684230"><span class="hex">#684230</span></div>
</div>
<div class="names">
  <div class="nm">cream-50</div><div class="nm">cream-100</div><div class="nm">sage-200</div>
  <div class="nm">sage-300</div><div class="nm">forest-700</div><div class="nm">camel-500</div><div class="nm">cocoa-700</div>
</div>
</body></html>
