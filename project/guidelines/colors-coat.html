<!-- @dsCard group="Colors" viewport="700x150" name="Cat coat colours" subtitle="Coat swatches for the szín filter & cards" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-50);font-family:var(--font-display);display:flex;gap:22px;align-items:flex-start}
  .item{display:flex;flex-direction:column;align-items:center;gap:7px}
  .sw{width:54px;height:54px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(104,66,48,.12),var(--shadow-xs)}
  .lab{font-size:12px;color:var(--text-body);font-weight:500}
  .tok{font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="item"><div class="sw" style="background:var(--cat-orange)"></div><span class="lab">Vörös</span><span class="tok">--cat-orange</span></div>
  <div class="item"><div class="sw" style="background:var(--cat-cream)"></div><span class="lab">Krém</span><span class="tok">--cat-cream</span></div>
  <div class="item"><div class="sw" style="background:var(--cat-grey)"></div><span class="lab">Szürke</span><span class="tok">--cat-grey</span></div>
  <div class="item"><div class="sw" style="background:var(--cat-black)"></div><span class="lab">Fekete</span><span class="tok">--cat-black</span></div>
  <div class="item"><div class="sw" style="background:var(--cat-white)"></div><span class="lab">Fehér</span><span class="tok">--cat-white</span></div>
  <div class="item"><div class="sw" style="background:var(--cat-tortie)"></div><span class="lab">Teknős</span><span class="tok">--cat-tortie</span></div>
</body></html>
