<!-- @dsCard group="Components" viewport="700x430" name="Catalog — CatCard & ColorSwatch" subtitle="The adoptable-cat listing card and coat-colour swatches" -->
<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px 24px; background: var(--cream-50); }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 640px; }
  .swatches { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { CatCard, ColorSwatch } = window.CicaKeresDesignSystem_1a6097;
const M = "../../assets/mascot-cat.png";
function App() {
  const [fav, setFav] = React.useState(true);
  const [sel, setSel] = React.useState('voros');
  return (
    <div>
      <div className="cards">
        <CatCard name="Mázli" photo={M} age="2 éves" sex="kandúr" breed="Európai rövidszőrű"
          coatColor="var(--cat-orange)" location="Budapest" shelter="Mancs Menhely"
          status="available" favorite={fav} onFavorite={()=>setFav(!fav)} onClick={()=>{}} />
        <CatCard name="Cirmi" photo={M} age="6 hónapos" sex="nőstény" breed="Cirmos"
          coatColor="var(--cat-orange)" location="Szeged" shelter="Talpacska"
          status="urgent" favorite={false} onFavorite={()=>{}} onClick={()=>{}} />
      </div>
      <div className="swatches">
        {[['voros','Vörös','var(--cat-orange)'],['krem','Krém','var(--cat-cream)'],
          ['szurke','Szürke','var(--cat-grey)'],['fekete','Fekete','var(--cat-black)'],
          ['feher','Fehér','var(--cat-white)'],['teknos','Teknős','var(--cat-tortie)']
        ].map(([id,lab,c])=>(
          <ColorSwatch key={id} color={c} label={lab} size="lg"
            selected={sel===id} onClick={()=>setSel(id)} />
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
