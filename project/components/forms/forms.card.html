<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px 24px; background: var(--cream-50); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 16px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, FilterChip } = window.CicaKeresDesignSystem_1a6097;
const search = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>;
function App() {
  const [sel, setSel] = React.useState('Felnőtt');
  const [chk, setChk] = React.useState(true);
  const [active, setActive] = React.useState('kolyök');
  return (
    <div>
      <div className="grid">
        <Input label="Keresés" placeholder="Cica neve…" iconLeft={search} />
        <Select label="Kor" value={sel} onChange={e=>setSel(e.target.value)}
          options={['Kölyök','Fiatal','Felnőtt','Idős']} />
        <Select label="Nem" placeholder="Bármely" options={['Nőstény','Kandúr']} />
      </div>
      <div className="stack" style={{marginTop:16}}>
        <Checkbox label="Csak ivartalanított cicák" checked={chk} onChange={e=>setChk(e.target.checked)} />
        <Checkbox label="Kompatibilis gyerekekkel" checked={false} onChange={()=>{}} />
      </div>
      <div className="chips">
        {[['kolyök','Kölyök',42],['voros','Vörös',28],['fekete','Fekete',16],['surgos','Sürgős',5]].map(([id,lab,n])=>(
          <FilterChip key={id} selected={active===id} count={n} onClick={()=>setActive(id)}>{lab}</FilterChip>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
