<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CicaKereső</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--color-bg); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  .view-fade { animation: ckfade var(--dur-slow) var(--ease-out); }
  @keyframes ckfade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="app"></div>

<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="HomeView.jsx"></script>
<script type="text/babel" src="BrowseView.jsx"></script>
<script type="text/babel" src="CatProfileView.jsx"></script>
<script type="text/babel" src="ShelterView.jsx"></script>
<script type="text/babel" src="ServicesView.jsx"></script>
<script type="text/babel" src="DonateView.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [view, setView] = React.useState('home');
  const [catId, setCatId] = React.useState(null);
  const [shelterId, setShelterId] = React.useState(null);

  React.useEffect(() => { window.scrollTo(0, 0); }, [view, catId, shelterId]);

  const nav = (v) => { setShelterId(null); setView(v); };
  const openCat = (id) => { setCatId(id); setView('cat'); };
  const openShelter = (id) => { setShelterId(id || null); setView('shelters'); };

  const headerView = view === 'cat' ? 'browse' : view;

  let content;
  if (view === 'home') content = <window.HomeView onNav={nav} onOpenCat={openCat} />;
  else if (view === 'browse') content = <window.BrowseView onOpenCat={openCat} />;
  else if (view === 'cat') content = <window.CatProfileView catId={catId} onNav={nav} onOpenCat={openCat} onOpenShelter={openShelter} />;
  else if (view === 'shelters') content = <window.ShelterView shelterId={shelterId} onOpenShelter={openShelter} onOpenCat={openCat} onNav={nav} />;
  else if (view === 'services') content = <window.ServicesView />;
  else if (view === 'donate') content = <window.DonateView />;

  return (
    <React.Fragment>
      <window.Header view={headerView} onNav={nav} />
      <main style={{ flex: 1 }} className="view-fade" key={view + (catId||'') + (shelterId||'')}>
        {content}
      </main>
      <window.Footer onNav={nav} />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
